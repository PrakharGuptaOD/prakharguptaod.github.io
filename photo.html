    <style>
        /* Base Minimalist Aesthetic */
        :root {
            --bg: #fafafa;
            --text: #111;
            --text-secondary: #555;
            --accent: #000;
            --border: #ddd;
            --font-heading: 'Playfair Display', serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            max-width: 1000px; 
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .back-link {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .back-link:hover { color: var(--accent); }

        h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p.gallery-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
            max-width: 600px;
        }

        main { flex-grow: 1; display: flex; flex-direction: column; }

        /* --- Apple Watch Style Viewport (The Window) --- */
        .gallery-viewport {
            width: 100%;
            height: 65vh; /* Takes up a large portion of the screen */
            overflow: hidden;
            background-color: #f4f4f4; /* Slightly darker to define the canvas edge */
            border-radius: 8px;
            border: 1px solid var(--border);
            position: relative;
            cursor: grab;
            margin-bottom: 40px;
            /* Inner shadow to give it depth */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }

        .gallery-viewport:active {
            cursor: grabbing;
        }

        /* --- The Draggable Canvas --- */
        .gallery-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Centers the canvas initially */
            transform: translate(-50%, -50%);
            width: 1800px; /* Much larger than the screen */
            height: 1200px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 40px;
            padding: 50px;
        }

        /* --- Scattered Photo Items (Original Aspect Ratios) --- */
        .photo-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 280px; /* Fixed height, but width adjusts automatically to aspect ratio */
            width: max-content;
        }

        .photo-item img {
            height: 100%;
            width: auto;
            display: block;
        }

        /* --- The "Scattering" Magic using Math --- */
        /* This pushes specific items up, down, and rotates them randomly */
        .photo-item:nth-child(2n) { margin-top: 80px; transform: rotate(2deg); }
        .photo-item:nth-child(3n) { margin-bottom: 60px; transform: rotate(-3deg); }
        .photo-item:nth-child(4n) { margin-top: -30px; transform: rotate(1.5deg); }
        .photo-item:nth-child(5n) { margin-bottom: 40px; transform: rotate(-1.5deg); }

        /* --- Hover Overlay & Interaction --- */
        .photo-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        .expand-icon {
            color: #ffffff;
            font-size: 2.5rem;
            text-decoration: none;
            transform: scale(0.8); 
            transition: transform 0.3s ease, color 0.2s ease;
            padding: 20px;
        }

        /* Hovering over a photo straightens it out and pops it forward */
        .photo-item:hover { 
            transform: scale(1.08) rotate(0deg) !important; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 10;
        }
        
        .photo-item:hover .photo-overlay { opacity: 1; }
        .photo-item:hover .expand-icon { transform: scale(1); }
        .expand-icon:hover { color: #ccc; }

        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .photo-item { height: 200px; } /* Slightly smaller photos on mobile */
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const viewport = document.getElementById('viewport');
            const canvas = document.getElementById('canvas');
            
            let isDragging = false;
            let startX, startY;
            
            // This stores the cumulative pan distance
            let currentX = 0, currentY = 0;

            // Mouse Events
            viewport.addEventListener('mousedown', (e) => {
                isDragging = true;
                // Capture where the user clicked relative to current pan position
                startX = e.clientX - currentX;
                startY = e.clientY - currentY;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); // Prevents text selection while dragging
                
                // Calculate new position
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;
                
                // Apply transform. The -50% ensures it stays centered naturally.
                canvas.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
            });

            // Touch Events for Mobile support
            viewport.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX - currentX;
                startY = e.touches[0].clientY - currentY;
            });

            window.addEventListener('touchend', () => {
                isDragging = false;
            });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); // Prevents the whole web page from scrolling while panning the canvas
                
                currentX = e.touches[0].clientX - startX;
                currentY = e.touches[0].clientY - startY;
                
                canvas.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
            }, { passive: false });
        });
    </script>
