<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Photography | Prakhar Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Base Minimalist Aesthetic */
        :root {
            --bg: #fafafa;
            --text: #111;
            --text-secondary: #555;
            --accent: #000;
            --border: #ddd;
            --font-heading: 'Playfair Display', serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            max-width: 1000px; 
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .back-link {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .back-link:hover { color: var(--accent); }

        /* Page Header */
        h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p.gallery-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
            max-width: 600px;
        }

        main { flex-grow: 1; }

        /* --- Masonry Grid Layout --- */
        .masonry-gallery {
            column-count: 3; /* 3 columns on desktop */
            column-gap: 20px;
            margin-bottom: 60px;
        }

        /* --- Individual Photo Container --- */
        .photo-item {
            position: relative;
            margin-bottom: 20px;
            break-inside: avoid; /* Prevents images from splitting across columns */
            border-radius: 4px;
            overflow: hidden;
            background-color: var(--border); /* Placeholder color while loading */
        }

        .photo-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        /* --- Hover Overlay --- */
        .photo-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .expand-icon {
            color: #ffffff;
            font-size: 2rem;
            text-decoration: none;
            transform: scale(0.8);
            transition: transform 0.3s ease, color 0.2s ease;
            padding: 20px;
        }

        /* Hover Interactions */
        .photo-item:hover img { transform: scale(1.03); }
        .photo-item:hover .photo-overlay { opacity: 1; }
        .photo-item:hover .expand-icon { transform: scale(1); }
        .expand-icon:hover { color: #ccc; }

        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        /* Loading State */
        .loading-text {
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px 0;
        }

        /* Mobile Responsiveness */
        @media (max-width: 800px) {
            .masonry-gallery { column-count: 2; }
        }
        @media (max-width: 500px) {
            .masonry-gallery { column-count: 1; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.htm" class="back-link"><i class="fas fa-arrow-left"></i> Home</a>
        <span style="font-family: var(--font-heading); font-style: italic; color: var(--text-secondary);">Visuals</span>
    </header>

    <main>
        <h1>Captured <i>Moments.</i></h1>
        <p class="gallery-desc">A visual diary of moments, places, and perspectives captured through my lens.</p>

        <div class="masonry-gallery" id="galleryContainer">
            <div class="loading-text" id="loadingText">Developing negatives...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Prakhar Gupta.</p>
        <div style="font-family: var(--font-heading); font-style: italic;">
            Through the lens.
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const galleryContainer = document.getElementById('galleryContainer');
            const loadingText = document.getElementById('loadingText');
            
            // Your GitHub repository details
            const owner = 'PrakharGuptaOD';
            const repo = 'prakharguptaod.github.io';
            const folder = 'photos';
            
            // The GitHub API endpoint that lists files in the photos folder
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Could not fetch photos from GitHub API. Ensure the folder exists and is public.');
                    return response.json();
                })
                .then(files => {
                    // Remove the loading text once data is received
                    if (loadingText) loadingText.remove();

                    // Loop through whatever files GitHub found in that folder
                    files.forEach(file => {
                        // Check if the file is an image (ignores hidden files or READMEs)
                        if (file.type === 'file' && file.name.match(/\.(jpe?g|png|gif|webp)$/i)) {
                            
                            // Use the relative path to load the image locally
                            const imagePath = `${folder}/${file.name}`;

                            // Create the wrapper div
                            const photoItem = document.createElement('div');
                            photoItem.className = 'photo-item';

                            // Construct the HTML for the image and overlay
                            photoItem.innerHTML = `
                                <img src="${imagePath}" loading="lazy" alt="${file.name}">
                                <div class="photo-overlay">
                                    <a href="${imagePath}" target="_blank" rel="noopener noreferrer" class="expand-icon" title="Open full resolution">
                                        <i class="fas fa-external-link-alt"></i>
                                    </a>
                                </div>
                            `;

                            // Add it to the gallery
                            galleryContainer.appendChild(photoItem);
                        }
                    });

                    if (galleryContainer.innerHTML.trim() === '') {
                        galleryContainer.innerHTML = '<p class="loading-text">No photos found in the directory.</p>';
                    }
                })
                .catch(error => {
                    console.error(error);
                    if (loadingText) loadingText.remove();
                    galleryContainer.innerHTML = '<p style="color: #666; padding: 20px;">Unable to load gallery at this time. Make sure the /photos folder exists in your repository.</p>';
                });
        });
    </script>
</body>
</html>
