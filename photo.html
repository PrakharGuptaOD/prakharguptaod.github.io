    <style>
        /* Base Minimalist Aesthetic */
        :root {
            --bg: #fafafa;
            --text: #111;
            --text-secondary: #555;
            --accent: #000;
            --border: #ddd;
            --font-heading: 'Playfair Display', serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            max-width: 1000px; /* Slightly wider for a photo gallery */
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .back-link {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .back-link:hover { color: var(--accent); }

        /* Page Header */
        h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p.gallery-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
            max-width: 600px;
        }

        main { flex-grow: 1; }

        /* --- Collage Grid Layout --- */
        .photo-collage {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; 
            margin-bottom: 60px;
        }

        /* --- Individual Photo Container --- */
        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px; 
            aspect-ratio: 1 / 1; 
            background-color: var(--border); 
        }

        /* --- The Image --- */
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.4s ease;
        }

        /* --- Hover Overlay --- */
        .photo-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        .expand-icon {
            color: #ffffff;
            font-size: 2rem;
            text-decoration: none;
            transform: scale(0.8); 
            transition: transform 0.3s ease, color 0.2s ease;
            /* Make the hit area slightly larger than the icon */
            padding: 20px;
        }

        /* Hover Interactions */
        .photo-item:hover img { transform: scale(1.05); }
        .photo-item:hover .photo-overlay { opacity: 1; }
        .photo-item:hover .expand-icon { transform: scale(1); }
        .expand-icon:hover { color: #ccc; }

        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .photo-collage { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
        }
    </style>
</head>
