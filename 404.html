<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Page Not Found | Prakhar Gupta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* Minimalist aesthetic with elegant typography */
        :root {
            --bg: #fafafa;
            --text: #111;
            --text-secondary: #555;
            --accent: #000;
            --border: #ddd;
            --hover-bg: #f0f0f0;
            --font-heading: 'Playfair Display', serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            
            /* The Engineering Graph Grid Pattern */
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 40px 0 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            font-style: italic;
            color: var(--text);
            text-decoration: none;
            background-color: var(--bg); /* Adds readability over the grid */
            padding-right: 10px;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            transition: opacity 0.2s;
        }

        nav { display: block; }
        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }
        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            transition: color 0.2s;
            background-color: var(--bg); /* Adds readability over the grid */
            padding: 2px 5px;
        }
        nav a:hover { color: var(--accent); }

        /* 404 Specific Layout */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 0;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: 8rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1;
            margin-bottom: 10px;
            color: var(--text);
        }

        .error-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 450px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            border-radius: 4px;
            transition: opacity 0.2s, background-color 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #fff;
            border: 1px solid var(--accent);
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            background-color: var(--bg); /* Keep text legible over grid */
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-secondary);
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .social-links a:hover { color: var(--accent); }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .mobile-menu-btn { display: block; }
            nav {
                width: 100%;
                display: none;
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid var(--border);
            }
            nav.show { display: block; }
            nav ul { flex-direction: column; gap: 1rem; }
            nav a {
                font-family: var(--font-heading);
                font-size: 1.5rem;
                font-style: italic;
                color: var(--text);
                display: block;
            }
            .error-code { font-size: 5rem; }
            footer {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="/index.htm" class="logo">Prakhar Gupta</a>
        <button id="mobileMenuBtn" class="mobile-menu-btn">Menu</button>
        <nav id="navMenu">
            <ul>
                <li><a href="/index.htm#about">About</a></li>
                <li><a href="/index.htm#projects">Projects</a></li>
                <li><a href="/index.htm#hobbies">Hobbies</a></li>
                <li><a href="/resume.html">Resume</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="error-code">404.</div>
        <p class="error-message">
            This node could not be found. The architecture you are looking for has either been moved, deleted, or never existed in this environment.
        </p>
        <a href="/index.htm" class="btn btn-primary">Return to Initialization</a>
    </main>

    <footer>
        <p>&copy; 2026 Prakhar Gupta.</p>
        <div class="social-links">
            <a href="https://github.com/PrakharGuptaOD"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/in/prakhar-kselis"><i class="fab fa-linkedin"></i></a>
            <a href="mailto:prakhargupta.od@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const navMenu = document.getElementById('navMenu');
            const navLinks = navMenu.querySelectorAll('a');

            mobileMenuBtn.addEventListener('click', () => {
                navMenu.classList.toggle('show');
                mobileMenuBtn.textContent = navMenu.classList.contains('show') ? 'Close' : 'Menu';
            });

            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('show');
                    mobileMenuBtn.textContent = 'Menu';
                });
            });
        });
    </script>
</body>
</html>
